name: validate

# Pre-merge guard: render and schema-validate every manifest before ArgoCD
# ever sees it, so a broken kustomization or bad CR fails here instead of
# failing sync on the live cluster.

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      KUSTOMIZE_VERSION: "5.4.3"
      KUBECONFORM_VERSION: "0.8.0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install kustomize
        run: |
          curl -fsSL "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv${KUSTOMIZE_VERSION}/kustomize_v${KUSTOMIZE_VERSION}_linux_amd64.tar.gz" \
            | tar -xz -C /usr/local/bin kustomize

      - name: Install kubeconform
        run: |
          curl -fsSL "https://github.com/yannh/kubeconform/releases/download/v${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" \
            | tar -xz -C /usr/local/bin kubeconform

      - name: Validate manifests
        run: ./scripts/validate.sh
