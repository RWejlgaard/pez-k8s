apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: default
spec:
  disruption:
    # Cap voluntary disruption to 10% of nodes at a time; consolidate a node
    # 1m after it goes empty or underutilized.
    budgets:
      - nodes: 10%
    consolidateAfter: 1m
    consolidationPolicy: WhenEmptyOrUnderutilized
  # Fleet ceiling for this site: never provision past 32 vCPU / 60Gi.
  # copenhagen-a has 32 vCPU / 64Gi total (leaves headroom for the control plane
  # and hypervisor itself).
  limits:
    cpu: "32"
    memory: 60Gi
  template:
    spec:
      # Recycle nodes after 30 days so they pick up fresh base images.
      expireAfter: 720h
      nodeClassRef:
        group: karpenter.proxmox.sinextra.dev
        kind: ProxmoxNodeClass
        name: default
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand"]
      # Matches the k3s agent join (register-with-taints) so the CNI/networking
      # lands before workloads on a new node.
      startupTaints:
        - effect: NoExecute
          key: karpenter.sh/unregistered
