# Everything that is actually different about pez-london lives here; the
# manifests themselves are shared in ../base.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base
patches:
  # Tailscale IP that Caddy forwards to (TLS terminates at Caddy).
  - target:
      kind: Application
      name: istio-ingressgateway
    patch: |-
      - op: replace
        path: /spec/source/helm/valuesObject/service/externalIPs
        value: ["100.123.97.26"]
  - target:
      kind: Gateway
      name: shared-gateway
    patch: |-
      - op: replace
        path: /spec/listeners/0/hostname
        value: "*.lon.pez.sh"
  # NFS server IP: london-a's real LAN address on vmbr0.
  - target:
      kind: StorageClass
      name: nfs-csi
    patch: |-
      - op: replace
        path: /parameters/server
        value: 192.168.1.254
  # Must match region in the out-of-band karpenter-provider-proxmox secret.
  - target:
      kind: ProxmoxNodeClass
      name: default
    patch: |-
      - op: replace
        path: /spec/region
        value: pez-london
  # Fleet ceiling: london-a is the small site, never provision past 15 vCPU / 30Gi.
  - target:
      kind: NodePool
      name: default
    patch: |-
      - op: replace
        path: /spec/limits
        value:
          cpu: "15"
          memory: 30Gi
  # Uncomment together with k8s-monitoring.yaml in ../base/kustomization.yaml.
