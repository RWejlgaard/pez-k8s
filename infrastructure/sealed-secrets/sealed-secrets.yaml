apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sealed-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://bitnami.github.io/sealed-secrets
    chart: sealed-secrets
    targetRevision: "2.19.1"
    helm:
      values: |
        # Match kubeseal's zero-flag defaults (controller name
        # "sealed-secrets-controller" in namespace "kube-system") so sealing
        # a secret never needs --controller-name/--controller-namespace.
        fullnameOverride: sealed-secrets-controller
        namespace: kube-system
        # Right-sized for this small homelab (1-vCPU / 2Gi worker nodes),
        # same reasoning as infrastructure/istio/istiod.yaml.
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
