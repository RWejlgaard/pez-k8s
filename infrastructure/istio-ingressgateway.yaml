apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: istio-ingressgateway
  namespace: istio-system
spec:
  interval: 1h
  dependsOn:
    - name: istiod
  chart:
    spec:
      chart: gateway
      version: "1.30.2"
      sourceRef:
        kind: HelmRepository
        name: istio
        namespace: flux-system
  values:
    # Pin the ingress gateway to the stable control-plane node (Karpenter
    # workers are ephemeral) and expose it ONLY on the Tailscale IP that Caddy
    # forwards to (TLS terminates at Caddy). ClusterIP + externalIPs avoids
    # k3s servicelb binding every node's LAN IP.
    service:
      type: ClusterIP
      externalIPs:
        - 100.123.97.26
    nodeSelector:
      kubernetes.io/hostname: k8s-control-plane
    tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
    # Lightweight request so it fits the resource-constrained control-plane.
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        cpu: 500m
        memory: 256Mi
