---
apiVersion: v1
kind: Namespace
metadata:
  name: kro
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: kro
  namespace: flux-system
spec:
  type: oci
  interval: 1h
  url: oci://registry.k8s.io/kro/charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kro
  namespace: kro
spec:
  interval: 1h
  chart:
    spec:
      chart: kro
      version: "0.9.2"
      sourceRef:
        kind: HelmRepository
        name: kro
        namespace: flux-system
  install:
    remediation:
      retries: 3
    crds: CreateReplace
  upgrade:
    remediation:
      retries: 3
    crds: CreateReplace
