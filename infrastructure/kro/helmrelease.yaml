---
apiVersion: v1
kind: Namespace
metadata:
  name: kro
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: kro
  namespace: flux-system
spec:
  type: oci
  interval: 1h
  url: oci://ghcr.io/kro-run/kro
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kro
  namespace: kro
spec:
  interval: 1h
  chart:
    spec:
      chart: kro
      # TODO(pez): confirm the latest chart version before applying.
      #   helm show chart oci://ghcr.io/kro-run/kro/kro
      # (no network here to pin it for you).
      version: "0.2.1"
      sourceRef:
        kind: HelmRepository
        name: kro
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
