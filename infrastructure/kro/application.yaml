apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kro
  namespace: argocd
spec:
  project: default
  source:
    repoURL: registry.k8s.io/kro/charts
    chart: kro
    targetRevision: "0.9.2"
  destination:
    server: https://kubernetes.default.svc
    namespace: kro
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      # kro's CRDs need force-replace on upgrade, same reason the old HelmRelease
      # set install/upgrade crds: CreateReplace.
      - ServerSideApply=true
