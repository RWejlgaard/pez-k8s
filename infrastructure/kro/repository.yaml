# Declares the kro OCI Helm registry to ArgoCD so the "kro" Application below can
# reference it by repoURL. No credentials — registry.k8s.io is public/anonymous —
# so this is safe to commit, same as the old Flux HelmRepository it replaces.
apiVersion: v1
kind: Secret
metadata:
  name: kro-helm-repo
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: repository
stringData:
  type: helm
  name: kro
  url: registry.k8s.io/kro/charts
  enableOCI: "true"
