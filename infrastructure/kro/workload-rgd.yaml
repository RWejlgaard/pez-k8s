apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: workload
spec:
  # Generated CRD: Workload (kro.run/v1alpha1, namespaced).
  # A Workload is declared in the `workloads` namespace; kro fans it out into
  # its own per-app namespace (named after the Workload) with the ambient label,
  # a Deployment, Service, an optional PodDisruptionBudget, and an HTTPRoute on
  # the shared gateway. Cleanup is handled by kro's finalizer (cross-namespace,
  # so native owner-ref GC does not apply).
  schema:
    apiVersion: v1alpha1
    kind: Workload
    spec:
      image: string | required=true
      port: integer | required=true
      replicas: integer | default=1
      # host defaults to "<name>.k8s.pez.sh" when left empty.
      host: string | default=""
      readinessPath: string | default="/"
      livenessPath: string | default="/"
      cpuRequest: string | default="50m"
      memoryRequest: string | default="32Mi"
      cpuLimit: string | default="200m"
      memoryLimit: string | default="64Mi"
    status:
      # Surface the rolled-up Deployment availability back on the Workload.
      availableReplicas: ${deployment.status.availableReplicas}

  resources:
    - id: namespace
      template:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: ${schema.metadata.name}
          labels:
            istio.io/dataplane-mode: ambient

    - id: deployment
      template:
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: ${schema.metadata.name}
          namespace: ${namespace.metadata.name}
        spec:
          replicas: ${schema.spec.replicas}
          selector:
            matchLabels:
              app: ${schema.metadata.name}
          template:
            metadata:
              labels:
                app: ${schema.metadata.name}
            spec:
              nodeSelector:
                karpenter.sh/nodepool: default
              # Best-effort spread so Karpenter consolidation can't drain the
              # whole app at once; a no-op at replicas=1 (ScheduleAnyway).
              topologySpreadConstraints:
                - maxSkew: 1
                  topologyKey: kubernetes.io/hostname
                  whenUnsatisfiable: ScheduleAnyway
                  labelSelector:
                    matchLabels:
                      app: ${schema.metadata.name}
              containers:
                - name: ${schema.metadata.name}
                  image: ${schema.spec.image}
                  ports:
                    - name: http
                      containerPort: ${schema.spec.port}
                  readinessProbe:
                    httpGet:
                      path: ${schema.spec.readinessPath}
                      port: http
                    initialDelaySeconds: 2
                    periodSeconds: 10
                  livenessProbe:
                    httpGet:
                      path: ${schema.spec.livenessPath}
                      port: http
                    initialDelaySeconds: 5
                    periodSeconds: 15
                  resources:
                    requests:
                      cpu: ${schema.spec.cpuRequest}
                      memory: ${schema.spec.memoryRequest}
                    limits:
                      cpu: ${schema.spec.cpuLimit}
                      memory: ${schema.spec.memoryLimit}

    - id: service
      template:
        apiVersion: v1
        kind: Service
        metadata:
          name: ${schema.metadata.name}
          namespace: ${namespace.metadata.name}
        spec:
          selector:
            app: ${schema.metadata.name}
          ports:
            - name: http
              port: ${schema.spec.port}
              targetPort: http

    - id: pdb
      # Only meaningful with more than one replica.
      includeWhen:
        - ${schema.spec.replicas > 1}
      template:
        apiVersion: policy/v1
        kind: PodDisruptionBudget
        metadata:
          name: ${schema.metadata.name}
          namespace: ${namespace.metadata.name}
        spec:
          minAvailable: 1
          selector:
            matchLabels:
              app: ${schema.metadata.name}

    - id: route
      template:
        apiVersion: gateway.networking.k8s.io/v1
        kind: HTTPRoute
        metadata:
          name: ${schema.metadata.name}
          namespace: ${namespace.metadata.name}
        spec:
          parentRefs:
            - name: shared-gateway
              namespace: istio-system
          hostnames:
            - ${schema.spec.host != "" ? schema.spec.host : schema.metadata.name + ".k8s.pez.sh"}
          rules:
            - backendRefs:
                - name: ${schema.metadata.name}
                  port: ${schema.spec.port}
