apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: workload
spec:
  # Generated CRD: Workload (kro.run/v1alpha1, namespaced).
  # A Workload is declared in the `workloads` namespace; kro fans it out into
  # its own per-app namespace (named after the Workload) with the ambient label,
  # a dedicated ServiceAccount (the workload's mesh identity), a Deployment,
  # Service, an optional PodDisruptionBudget, an optional HPA, an HTTPRoute on
  # the shared gateway (public workloads only), and an optional
  # AuthorizationPolicy. Cleanup is handled by kro's finalizer (cross-namespace,
  # so native owner-ref GC does not apply).
  schema:
    apiVersion: v1alpha1
    kind: Workload
    spec:
      image: string | required=true
      port: integer | required=true
      # Fixed replica count; doubles as the HPA floor when autoscaling.
      replicas: integer | default=1
      # Autoscaling: maxReplicas > 0 creates an HPA scaling between `replicas`
      # and `maxReplicas` on CPU utilization (percent of cpuRequest;
      # metrics-server ships with k3s). The Deployment then stops declaring
      # spec.replicas entirely so kro's drift detection never fights the HPA
      # (kro 0.2.1 re-applies any field present in the template).
      maxReplicas: integer | default=0
      targetCPUUtilization: integer | default=80
      # host defaults to "<name>.k8s.pez.sh" when left empty.
      host: string | default=""
      # public=false skips the HTTPRoute: the app is reachable only inside the
      # mesh (pair with allowTrafficFrom to pin down exactly who may call it).
      public: boolean | default=true
      readinessPath: string | default="/"
      livenessPath: string | default="/"
      cpuRequest: string | default="50m"
      memoryRequest: string | default="32Mi"
      cpuLimit: string | default="200m"
      memoryLimit: string | default="64Mi"
      # Hardening escape hatches. Defaults are strict: run as uid 65532 with
      # every capability dropped, read-only root filesystem (a writable
      # emptyDir is always mounted at /tmp), no SA token, seccomp
      # RuntimeDefault.
      #
      # allowRoot: run as uid 0 with standard container capabilities (minus
      # NET_RAW) — for images with no USER directive or that bind ports <1024
      # (e.g. nginx-based images, echo-server).
      allowRoot: boolean | default=false
      # writableRootFilesystem: for images that write outside /tmp at runtime
      # (nginx caches, etc.).
      writableRootFilesystem: boolean | default=false
      # Workload authorization (ambient L4, enforced by ztunnel on the callee).
      # When either list is non-empty an AuthorizationPolicy is generated that
      # ALLOWs only the listed identities (plus the shared ingress gateway when
      # public, so the HTTPRoute keeps working) and default-denies everything
      # else. Both empty (the default) => no policy => allow-all, unchanged
      # behaviour.
      #
      # allowTrafficFrom: sibling Workload names. Each maps to its SPIFFE
      # principal spiffe://cluster.local/ns/<name>/sa/<name>.
      allowTrafficFrom: "[]string | default=[]"
      # allowPrincipals: raw Istio principals passed straight through, for
      # external / cross-trust-domain identities that don't follow the
      # name==ns==sa convention (e.g. "cluster.local/ns/foo/sa/bar").
      allowPrincipals: "[]string | default=[]"
    status:
      # Rolled-up Deployment availability. Exactly one of these resolves —
      # each references one of the two mutually exclusive Deployment variants
      # below; kro's status resolution is best-effort and leaves the other
      # unset.
      availableReplicas: ${deployment.status.availableReplicas}
      autoscaledAvailableReplicas: ${deploymentAutoscaled.status.availableReplicas}

  resources:
    - id: appNamespace
      template:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: ${schema.metadata.name}
          labels:
            istio.io/dataplane-mode: ambient

    - id: serviceAccount
      # Dedicated identity per workload so its SPIFFE ID is meaningful
      # (spiffe://cluster.local/ns/<name>/sa/<name>) rather than shared "default".
      template:
        apiVersion: v1
        kind: ServiceAccount
        metadata:
          name: ${schema.metadata.name}
          namespace: ${appNamespace.metadata.name}

    # Two mutually exclusive Deployment variants rendering the same object:
    # kro has no field-level conditionals, and a template that declares
    # spec.replicas would keep resetting whatever the HPA scaled to. Only the
    # `replicas` line may differ — KEEP EVERYTHING ELSE IN SYNC.
    - id: deployment
      includeWhen:
        - ${schema.spec.maxReplicas == 0}
      template:
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: ${schema.metadata.name}
          namespace: ${appNamespace.metadata.name}
        spec:
          replicas: ${schema.spec.replicas}
          selector:
            matchLabels:
              app: ${schema.metadata.name}
          template: &podTemplate
            metadata:
              labels:
                app: ${schema.metadata.name}
            spec:
              serviceAccountName: ${serviceAccount.metadata.name}
              # The SA is a mesh identity, not an API-server credential;
              # ztunnel gets certs via istiod, the pod never needs the token.
              automountServiceAccountToken: false
              enableServiceLinks: false
              securityContext:
                runAsNonRoot: "${schema.spec.allowRoot ? false : true}"
                runAsUser: "${schema.spec.allowRoot ? 0 : 65532}"
                runAsGroup: "${schema.spec.allowRoot ? 0 : 65532}"
                seccompProfile:
                  type: RuntimeDefault
              nodeSelector:
                karpenter.sh/nodepool: default
              # Best-effort spread so Karpenter consolidation can't drain the
              # whole app at once; a no-op at replicas=1 (ScheduleAnyway).
              topologySpreadConstraints:
                - maxSkew: 1
                  topologyKey: kubernetes.io/hostname
                  whenUnsatisfiable: ScheduleAnyway
                  labelSelector:
                    matchLabels:
                      app: ${schema.metadata.name}
              containers:
                - name: ${schema.metadata.name}
                  image: ${schema.spec.image}
                  securityContext:
                    allowPrivilegeEscalation: false
                    readOnlyRootFilesystem: "${schema.spec.writableRootFilesystem ? false : true}"
                    capabilities:
                      drop: '${schema.spec.allowRoot ? ["NET_RAW"] : ["ALL"]}'
                  ports:
                    - name: http
                      containerPort: ${schema.spec.port}
                  volumeMounts:
                    - name: tmp
                      mountPath: /tmp
                  readinessProbe:
                    httpGet:
                      path: ${schema.spec.readinessPath}
                      port: http
                    initialDelaySeconds: 2
                    periodSeconds: 10
                  livenessProbe:
                    httpGet:
                      path: ${schema.spec.livenessPath}
                      port: http
                    initialDelaySeconds: 5
                    periodSeconds: 15
                  resources:
                    requests:
                      cpu: ${schema.spec.cpuRequest}
                      memory: ${schema.spec.memoryRequest}
                    limits:
                      cpu: ${schema.spec.cpuLimit}
                      memory: ${schema.spec.memoryLimit}
              volumes:
                - name: tmp
                  emptyDir: {}

    - id: deploymentAutoscaled
      # Same pod template as `deployment` (shared via the &podTemplate/
      # *podTemplate YAML anchor below), but this variant omits spec.replicas
      # so the HPA owns the replica count (kro only diffs fields present in
      # the template).
      includeWhen:
        - ${schema.spec.maxReplicas > 0}
      template:
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: ${schema.metadata.name}
          namespace: ${appNamespace.metadata.name}
        spec:
          selector:
            matchLabels:
              app: ${schema.metadata.name}
          template: *podTemplate

    - id: hpa
      # Scales on CPU as a percentage of cpuRequest (metrics-server ships with
      # k3s). Targets the Deployment by name rather than by reference so the
      # HPA isn't gated on the Deployment's readiness.
      includeWhen:
        - ${schema.spec.maxReplicas > 0}
      template:
        apiVersion: autoscaling/v2
        kind: HorizontalPodAutoscaler
        metadata:
          name: ${schema.metadata.name}
          namespace: ${appNamespace.metadata.name}
        spec:
          scaleTargetRef:
            apiVersion: apps/v1
            kind: Deployment
            name: ${schema.metadata.name}
          minReplicas: ${schema.spec.replicas}
          maxReplicas: ${schema.spec.maxReplicas}
          metrics:
            - type: Resource
              resource:
                name: cpu
                target:
                  type: Utilization
                  averageUtilization: ${schema.spec.targetCPUUtilization}

    - id: service
      template:
        apiVersion: v1
        kind: Service
        metadata:
          name: ${schema.metadata.name}
          namespace: ${appNamespace.metadata.name}
        spec:
          selector:
            app: ${schema.metadata.name}
          ports:
            - name: http
              port: ${schema.spec.port}
              targetPort: http

    - id: pdb
      # Only meaningful when more than one replica can exist (fixed or via HPA).
      includeWhen:
        - ${schema.spec.replicas > 1 || schema.spec.maxReplicas > 1}
      template:
        apiVersion: policy/v1
        kind: PodDisruptionBudget
        metadata:
          name: ${schema.metadata.name}
          namespace: ${appNamespace.metadata.name}
        spec:
          minAvailable: 1
          selector:
            matchLabels:
              app: ${schema.metadata.name}

    - id: route
      # Public workloads only; internal ones are plain mesh services.
      includeWhen:
        - ${schema.spec.public}
      template:
        apiVersion: gateway.networking.k8s.io/v1
        kind: HTTPRoute
        metadata:
          name: ${schema.metadata.name}
          namespace: ${appNamespace.metadata.name}
        spec:
          parentRefs:
            - name: shared-gateway
              namespace: istio-system
          hostnames:
            # Single-quoted: the ternary's ` : ` would otherwise be parsed as a
            # YAML mapping instead of a string scalar.
            - '${schema.spec.host != "" ? schema.spec.host : schema.metadata.name + ".k8s.pez.sh"}'
          rules:
            - backendRefs:
                - name: ${schema.metadata.name}
                  port: ${schema.spec.port}

    - id: authz
      # Only generated when the workload opts in to lock-down. ALLOW action =>
      # any source not listed is denied. In ambient this is enforced at L4 by
      # ztunnel using the peer's mTLS SPIFFE identity, so no waypoint is needed.
      includeWhen:
        - ${size(schema.spec.allowTrafficFrom) > 0 ||
          size(schema.spec.allowPrincipals) > 0}
      template:
        apiVersion: security.istio.io/v1
        kind: AuthorizationPolicy
        metadata:
          name: ${schema.metadata.name}
          namespace: ${appNamespace.metadata.name}
        spec:
          selector:
            matchLabels:
              app: ${schema.metadata.name}
          action: ALLOW
          rules:
            - from:
                - source:
                    # Sibling names -> SPIFFE principals, plus any raw
                    # principals, plus the shared ingress gateway (public
                    # workloads only) so the HTTPRoute keeps working under
                    # default-deny.
                    principals:
                      '${schema.spec.allowTrafficFrom.map(w, "cluster.local/ns/" + w +
                      "/sa/" + w) + schema.spec.allowPrincipals +
                      (schema.spec.public ? ["cluster.local/ns/istio-system/sa/istio-ingressgateway"] : [])}'
