apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: istio-base
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://istio-release.storage.googleapis.com/charts
    chart: base
    targetRevision: "1.30.2"
  destination:
    server: https://kubernetes.default.svc
    namespace: istio-system
  # istiod (field manager "pilot-discovery") patches this webhook's caBundle
  # and flips failurePolicy Ignore->Fail once it's ready to serve — ignore
  # whatever that manager owns rather than enumerating fields, since Istio has
  # changed exactly which fields it patches across versions.
  ignoreDifferences:
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
      name: istiod-default-validator
      managedFieldsManagers:
        - pilot-discovery
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
