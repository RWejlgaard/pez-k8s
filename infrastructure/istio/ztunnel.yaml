apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ztunnel
  namespace: istio-system
spec:
  interval: 1h
  dependsOn:
    - name: istio-cni
  chart:
    spec:
      chart: ztunnel
      version: "1.30.2"
      sourceRef:
        kind: HelmRepository
        name: istio
        namespace: flux-system
  values:
    global:
      platform: k3s
    tolerations:
      - operator: Exists
