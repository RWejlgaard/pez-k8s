apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: istiod
  namespace: istio-system
spec:
  interval: 1h
  dependsOn:
    - name: istio-base
  chart:
    spec:
      chart: istiod
      version: "1.30.2"
      sourceRef:
        kind: HelmRepository
        name: istio
        namespace: flux-system
  values:
    profile: ambient
    global:
      platform: k3s
    # Right-sized for this small homelab (default 500m/2Gi doesn't fit the
    # 1-vCPU / 2Gi nodes). 1Gi fits the c1.1VCPU-2GB workers.
    pilot:
      resources:
        requests:
          cpu: 100m
          memory: 1Gi
