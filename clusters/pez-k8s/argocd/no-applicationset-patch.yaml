# Drop the ApplicationSet CRD + controller entirely. This design only uses
# plain Applications/AppProjects, and the ApplicationSet CRD's OpenAPI schema
# is enormous (~1.4MB) — applying it pegs this cluster's single-vCPU
# control-plane node hard enough to fail kubelet health probes cluster-wide
# (coredns/metrics-server briefly bounced during testing). Not worth carrying
# for a controller we don't use.
#
# No `namespace:` on the namespaced kinds below: the upstream manifest doesn't
# set one either (it's meant to be applied with `kubectl apply -n argocd`), and
# kustomize matches these delete patches before the namespace transformer runs.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: applicationsets.argoproj.io
$patch: delete
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: argocd-applicationset-controller
$patch: delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argocd-applicationset-controller
$patch: delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: argocd-applicationset-controller
$patch: delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argocd-applicationset-controller
$patch: delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: argocd-applicationset-controller
$patch: delete
---
apiVersion: v1
kind: Service
metadata:
  name: argocd-applicationset-controller
$patch: delete
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-applicationset-controller
$patch: delete
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: argocd-applicationset-controller-network-policy
$patch: delete
