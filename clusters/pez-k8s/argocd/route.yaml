apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd-server
  namespace: argocd
spec:
  parentRefs:
    - name: shared-gateway
      namespace: istio-system
  hostnames:
    - argocd.k8s.pez.sh
  rules:
    - backendRefs:
        - name: argocd-server
          port: 80
