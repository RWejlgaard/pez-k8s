apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: argocd
resources:
  - namespace.yaml
  # Pinned upstream install manifest (non-HA: single control-plane node, no need
  # for the ha/ variant). Same "pin a remote URL by tag" convention as the
  # Gateway API CRDs in infrastructure/istio/kustomization.yaml.
  - https://raw.githubusercontent.com/argoproj/argo-cd/v3.4.4/manifests/install.yaml
  - route.yaml
patches:
  - path: cmd-params-patch.yaml
  # Drop the ApplicationSet CRD + controller entirely (unused in this design;
  # its ~1.4MB CRD schema pegs this cluster's single-vCPU control-plane node
  # hard enough to fail kubelet health probes cluster-wide). One deletion per
  # patch entry: kustomize v5.4.3 panics (nil pointer dereference in
  # PatchTransformer) when more than one `$patch: delete` document shares a
  # single patch file/entry. No `namespace:` on the namespaced kinds — the
  # upstream manifest doesn't set one either (meant to be applied with
  # `kubectl apply -n argocd`), and these patches match before the namespace
  # transformer runs.
  - path: delete-applicationset-serviceaccount.yaml
  - path: delete-applicationset-role.yaml
  - path: delete-applicationset-clusterrole.yaml
  - path: delete-applicationset-rolebinding.yaml
  - path: delete-applicationset-clusterrolebinding.yaml
  - path: delete-applicationset-service.yaml
  - path: delete-applicationset-deployment.yaml
  - path: delete-applicationset-networkpolicy.yaml
  - path: delete-applicationset-crd.yaml
  # Same reasoning for dex (SSO, unused — we only use local admin login) and
  # notifications (unused — no Notification configs). Every pod removed
  # matters on this node's single vCPU.
  - path: delete-dex-serviceaccount.yaml
  - path: delete-dex-role.yaml
  - path: delete-dex-rolebinding.yaml
  - path: delete-dex-service.yaml
  - path: delete-dex-deployment.yaml
  - path: delete-dex-networkpolicy.yaml
  - path: delete-notifications-serviceaccount.yaml
  - path: delete-notifications-role.yaml
  - path: delete-notifications-rolebinding.yaml
  - path: delete-notifications-configmap.yaml
  - path: delete-notifications-secret.yaml
  - path: delete-notifications-service.yaml
  - path: delete-notifications-deployment.yaml
  - path: delete-notifications-networkpolicy.yaml
