# Self-managing "app of apps": ArgoCD reconciles its own install (../argocd)
# plus the infrastructure and apps Applications through one kustomize source,
# the cluster overlay at clusters/<cluster>/. The path here is a placeholder,
# patched to the real cluster by that overlay.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/RWejlgaard/pez-k8s.git
    targetRevision: main
    path: clusters/CLUSTER
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      # ArgoCD's own CRDs are too large for client-side apply's
      # last-applied-configuration annotation, required for self-management.
      - ServerSideApply=true
      # route.yaml's HTTPRoute CRD comes from the separate "infrastructure"
      # Application, not this sync, skip dry-run validation for it so this
      # sync doesn't fail whole-batch while waiting on that CRD to land.
      - SkipDryRunOnMissingResource=true
