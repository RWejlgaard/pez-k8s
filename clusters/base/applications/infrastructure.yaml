apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infrastructure
  namespace: argocd
  annotations:
    # Ahead of the "apps" Application (wave "2") so workloads never race
    # Istio/kro coming up. Replaces the old Flux dependsOn.
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://github.com/RWejlgaard/pez-k8s.git
    targetRevision: main
    path: infrastructure/clusters/CLUSTER
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      # PeerAuthentication's CRD is installed by istio-base's Helm chart
      # (a nested Application, wave 0) rather than a resource in this sync
      # itself. Without this, ArgoCD's up-front validation rejects the whole
      # sync as soon as it can't find that CRD, before applying anything —
      # this lets it skip validation and retry in wave order instead.
      - SkipDryRunOnMissingResource=true
