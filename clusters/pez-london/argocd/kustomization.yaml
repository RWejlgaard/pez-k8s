# ArgoCD install for pez-london: the shared base plus this cluster's UI
# hostname. Applied directly with kubectl during bootstrap, self-managed by
# the root Application afterwards (via clusters/pez-london/kustomization.yaml).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base/argocd
patches:
  - target:
      kind: HTTPRoute
      name: argocd-server
    patch: |-
      - op: replace
        path: /spec/hostnames
        value: ["argocd.lon.pez.sh"]
